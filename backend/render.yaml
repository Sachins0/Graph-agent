services:
  - type: web
    name: sap-o2c-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          
      - key: LLM_PROVIDER
        value: groq
      - key: DATABASE_URL
        value: ./o2c.db
    autoDeploy: true
